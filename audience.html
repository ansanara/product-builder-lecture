<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audience Monitor - Art35mm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="audience-layout" id="audience-layout">
    <!-- Slides will be visible directly -->
    <!-- Two canvases layered for fade effects -->
    <canvas id="canvas-1" class="audience-canvas canvas-show"></canvas>
    <canvas id="canvas-2" class="audience-canvas canvas-hide"></canvas>

    <!-- Black screen overlay -->
    <div id="black-screen"></div>
  </div>

  <script src="audience.js"></script>
</body>
</html>
