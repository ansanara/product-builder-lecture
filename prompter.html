<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompter Monitor - Art35mm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="prompter-layout">
    <!-- Current Slide -->
    <div class="prompter-box current">
      <div class="prompter-header">Current Slide</div>
      <canvas id="canvas-current" class="prompter-canvas"></canvas>
    </div>

    <!-- Next Slide -->
    <div class="prompter-box next">
      <div class="prompter-header">Next Slide</div>
      <canvas id="canvas-next" class="prompter-canvas"></canvas>
    </div>

    <!-- Info Bar (Time/Timer) -->
    <div class="prompter-info-bar">
      <div class="prompter-timer-group">
        <div class="prompter-time-item">
          <div class="prompter-time-label">Current Time</div>
          <div class="prompter-time-value" id="prompter-clock">00:00:00</div>
        </div>
        <div class="prompter-time-item">
          <div class="prompter-time-label">Elapsed Time</div>
          <div class="prompter-time-value timer" id="prompter-stopwatch">00:00</div>
        </div>
        <div class="prompter-time-item" id="prompter-remaining-container" style="display: none;">
          <div class="prompter-time-label">Remaining Time</div>
          <div class="prompter-time-value" id="prompter-remaining" style="color: var(--accent);">00:00</div>
        </div>
      </div>

      <!-- Message Area -->
      <div id="prompter-message-box" style="flex: 1; margin: 0 40px; background: rgba(245, 158, 11, 0.2); border: 1px dashed var(--accent); border-radius: 10px; padding: 10px 20px; display: none; align-items: center; justify-content: center; min-height: 60px;">
        <span id="prompter-message-text" style="font-size: 1.4rem; font-weight: 600; color: var(--accent); text-align: center;"></span>
      </div>

      <div class="prompter-timer-group">
        <button class="btn btn-primary" id="btn-prompter-fullscreen">Full Screen</button>
      </div>
    </div>
  </div>

  <script src="prompter.js"></script>
</body>
</html>
