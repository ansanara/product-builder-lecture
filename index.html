<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 프리젠터 - 발표자 뷰</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>
  <div class="presenter-layout">
    <!-- 상단 컨트롤 패널 -->
    <div class="top-bar">
      <div class="control-group">
        <label class="btn">
          PDF 열기
          <input type="file" id="pdf-upload" accept="application/pdf" style="display: none;">
        </label>
        <label class="btn">
          이미지 폴더 열기
          <input type="file" id="folder-upload" webkitdirectory directory style="display: none;">
        </label>
        <button class="btn btn-accent" id="btn-open-output">출력 모니터</button>
        <button class="btn btn-accent" id="btn-open-prompter">프롬프터</button>
        <button class="btn btn-danger" id="btn-black-screen">블랙(B)</button>

        <div class="radio-group" id="transition-mode">
          <input type="radio" id="mode-cut" name="transition" value="cut" checked>
          <label for="mode-cut">Cut</label>
          <input type="radio" id="mode-fade" name="transition" value="fade">
          <label for="mode-fade">Fade</label>
        </div>
      </div>

      <!-- 시계 및 타이머 -->
      <div class="info-group">
         <!-- 페이지 점프 -->
        <div class="control-group">
          <span style="font-size:0.9rem; color:var(--text-muted)">이동:</span>
          <input type="number" id="jump-input" class="input-field" min="1" placeholder="Pg">
          <button class="btn" id="btn-jump">Go</button>
        </div>
        <div class="time-display" id="clock">00:00:00</div>
        <div style="display: flex; align-items:center; gap: 10px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 20px;">
          <div class="timer-display" id="stopwatch">00:00</div>
          <div style="display: flex; flex-direction: column; gap: 5px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 15px; margin-left: 10px;">
            <div style="font-size: 0.75rem; color: var(--text-muted);">목표(분):</div>
            <input type="number" id="target-time-input" class="input-field" style="width: 60px; height: 30px;" min="1" placeholder="Min">
          </div>
          <div class="timer-controls">
            <button class="btn" id="btn-timer-start">시작</button>
            <button class="btn" id="btn-timer-reset">초기화</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 뷰어 패널 -->
    <div class="viewer-container">
      <div class="preview-box current">
        <div class="preview-header">
          <span>현재 슬라이드 (Current)</span>
          <span id="current-page-info">- / -</span>
        </div>
        <div class="slide-wrapper">
          <canvas id="presenter-current-canvas" class="slide-canvas"></canvas>
        </div>
      </div>

      <div class="preview-box">
        <div class="preview-header">
          <span>다음 슬라이드 (Next)</span>
          <span id="next-page-info">-</span>
        </div>
        <div class="slide-wrapper">
          <canvas id="presenter-next-canvas" class="slide-canvas"></canvas>
        </div>
      </div>
    </div>

    <!-- 하단 컨트롤 -->
    <div class="bottom-bar">
      <button class="btn" id="btn-prev" style="width: 120px;">&larr; 이전 페이지</button>
      <button class="btn btn-primary" id="btn-next" style="width: 120px;">다음 페이지 &rarr;</button>
    </div>

    <!-- 우측 하단 메시지 패널 -->
    <div class="prompter-msg-panel">
      <div class="panel-header">프롬프터 메시지 전송</div>
      <div id="msg-log" class="msg-log-container-v2"></div>
      <div class="panel-input-group">
        <input type="text" id="prompter-msg-input" class="input-field" style="flex: 1; text-align: left;" placeholder="전달할 내용을 입력하세요...">
        <button class="btn btn-primary" id="btn-send-msg">전송</button>
        <button class="btn btn-danger" id="btn-clear-msg">지움</button>
      </div>
    </div>
  </div>

  <script src="presenter.js"></script>
</body>
</html>
